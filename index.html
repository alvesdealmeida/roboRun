<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robo Run: Protocolo de Elite</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a12;
            --panel-bg: rgba(20, 20, 35, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Orbitron', 'Segoe UI', sans-serif; }

        body { 
            margin: 0; background: var(--bg-dark); color: white; 
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* TELA DO JOGO (VIEWPORT) */
        #viewport {
            flex: 1; position: relative;
            background: linear-gradient(180deg, #000 0%, #0a0a1a 100%);
            border-bottom: 2px solid var(--neon-blue);
            overflow: hidden;
        }

        /* Grade de perspectiva no chão */
        .grid-floor {
            position: absolute; bottom: 0; width: 200%; height: 100px;
            background-image: 
                linear-gradient(var(--neon-blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-blue) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(100px) rotateX(45deg);
            opacity: 0.2;
            left: -50%;
        }

        #robot {
            position: absolute; bottom: 40px; left: 80px;
            font-size: 60px; z-index: 10;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            transition: bottom 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .entity {
            position: absolute; bottom: 50px; font-size: 45px;
            text-shadow: 0 0 15px currentColor;
        }

        /* HUD MODERNO */
        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 100;
        }

        .stat-box {
            background: var(--panel-bg); padding: 10px 20px;
            border: 1px solid var(--neon-blue); border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .life-bar { color: #ff4d4d; font-size: 1.2rem; }

        /* PAINEL DE COMANDOS */
        #console {
            flex: 1.3; background: #0f0f1a; padding: 20px;
            display: flex; flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .command-list {
            flex: 1; overflow-y: auto; padding-right: 10px;
            margin-bottom: 15px;
        }

        .cmd-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        select, input {
            background: #1a1a2e; color: var(--neon-blue);
            border: 1px solid var(--neon-blue); padding: 8px;
            border-radius: 6px; font-weight: bold;
        }

        .controls-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        button {
            padding: 18px; border: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-add { background: var(--glass); color: white; grid-column: span 2; border: 1px dashed white; }
        .btn-add:hover { background: rgba(255,255,255,0.1); }
        .btn-run { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        .btn-reset { background: #333; color: white; }

        /* TELA DE GAME OVER */
        #modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 1000;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="modal">
        <h1 id="modal-title" style="font-size: 3rem; color: var(--neon-pink);">SISTEMA CRÍTICO</h1>
        <p id="modal-desc" style="font-size: 1.2rem; margin: 20px;">O robô sofreu danos irreparáveis.</p>
        <button class="btn-run" onclick="location.reload()">REINICIAR NÚCLEO</button>
    </div>

    <div id="viewport">
        <div class="hud">
            <div class="stat-box">HP: <span class="life-bar" id="hp">❤️❤️❤️</span></div>
            <div class="stat-box">DATA: <span id="score" style="color: var(--neon-blue)">0</span> TB</div>
        </div>
        <div class="grid-floor"></div>
        <div id="robot">🤖</div>
    </div>

    <div id="console">
        <h2 style="color: var(--neon-blue); margin-top: 0; font-size: 1rem;">> TERMINAL DE COMANDO</h2>
        
        <div class="command-list" id="cmd-list"></div>

        <div class="controls-grid">
            <button class="btn-add" onclick="addNewCommand()">+ ADICIONAR SEQUÊNCIA DE DADOS</button>
            <button class="btn-run" id="run-btn" onclick="executeSync()">INICIAR SINCRONIZAÇÃO</button>
            <button class="btn-reset" onclick="location.reload()">ABORTAR</button>
        </div>
    </div>

<script>
    let lives = 3;
    let score = 0;
    let isActive = false;
    let sceneEntities = [];

    function addNewCommand() {
        const list = document.getElementById('cmd-list');
        const card = document.createElement('div');
        card.className = 'cmd-card';
        card.innerHTML = `
            <span style="color:#666">#0${list.children.length + 1}</span>
            <select class="type">
                <option value="run">MOVIMENTAR</option>
                <option value="jump">IMPULSO (SALTO)</option>
            </select>
            <input type="number" class="dur" value="1.5" step="0.5" min="0.5" style="width:70px">
            <span style="font-size:0.8rem">SEG</span>
            <button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--neon-pink); cursor:pointer; margin-left:auto">X</button>
        `;
        list.appendChild(card);
    }

    function generateLevel() {
        sceneEntities.forEach(e => e.el.remove());
        sceneEntities = [];
        const cards = document.querySelectorAll('.cmd-card');
        let timeTracker = 0;

        cards.forEach(c => {
            const duration = parseFloat(c.querySelector('.dur').value);
            timeTracker += duration;
            
            const dist = timeTracker * 250; // Velocidade 250px/s
            const el = document.createElement('div');
            el.className = 'entity';
            el.style.left = (80 + dist) + "px";
            
            // Lógica de desafio: Obstáculo vs Item
            const chance = Math.random();
            if(chance > 0.4) {
                el.innerText = '⚡'; // Obstáculo elétrico
                el.style.color = '#ff0055';
                el.dataset.type = 'hazard';
            } else {
                el.innerText = '💾'; // Item de dados
                el.style.color = 'var(--neon-blue)';
                el.dataset.type = 'data';
            }
            
            document.getElementById('viewport').appendChild(el);
            sceneEntities.push({ el, x: 80 + dist, type: el.dataset.type, processed: false });
        });
    }

    async function executeSync() {
        if(isActive) return;
        generateLevel();
        isActive = true;
        document.getElementById('run-btn').disabled = true;

        const cards = document.querySelectorAll('.cmd-card');
        const robot = document.getElementById('robot');
        const startTime = performance.now();
        const totalDuration = Array.from(cards).reduce((acc, c) => acc + parseFloat(c.querySelector('.dur').value), 0);

        function gameLoop(now) {
            if(!isActive) return;
            let elapsed = (now - startTime) / 1000;
            let currentDist = elapsed * 250;

            // Encontrar ação atual baseada no tempo
            let checkTime = 0;
            let currentAction = 'run';
            for(let c of cards) {
                let d = parseFloat(c.querySelector('.dur').value);
                if(elapsed >= checkTime && elapsed < checkTime + d) {
                    currentAction = c.querySelector('.type').value;
                    break;
                }
                checkTime += d;
            }

            // Altura do Robô
            robot.style.bottom = (currentAction === 'jump') ? "160px" : "40px";

            // Movimentação e Colisão
            sceneEntities.forEach(item => {
                let visualX = item.x - currentDist;
                item.el.style.left = visualX + "px";

                if(!item.processed && visualX < 130 && visualX > 40) {
                    item.processed = true;
                    if(item.type === 'hazard' && currentAction !== 'jump') {
                        lives--;
                        flashRed();
                    } else if(item.type === 'data') {
                        score += 5;
                        item.el.style.opacity = '0';
                    }
                    updateHUD();
                }
            });

            if(elapsed < totalDuration && lives > 0) {
                requestAnimationFrame(gameLoop);
            } else {
                finishMission();
            }
        }
        requestAnimationFrame(gameLoop);
    }

    function flashRed() {
        document.getElementById('viewport').style.boxShadow = "inset 0 0 50px #ff0000";
        setTimeout(() => document.getElementById('viewport').style.boxShadow = "none", 300);
    }

    function updateHUD() {
        document.getElementById('hp').innerText = '❤️'.repeat(lives);
        document.getElementById('score').innerText = score;
    }

    function finishMission() {
        isActive = false;
        document.getElementById('run-btn').disabled = false;
        const modal = document.getElementById('modal');
        const title = document.getElementById('modal-title');
        const desc = document.getElementById('modal-desc');

        modal.style.display = 'flex';
        if(lives <= 0) {
            title.innerText = "SISTEMA COMPROMETIDO";
            title.style.color = "var(--neon-pink)";
            desc.innerText = `O robô atingiu 3 obstáculos e foi desativado. Dados recuperados: ${score} TB.`;
        } else {
            title.innerText = "MISSÃO COMPLETA";
            title.style.color = "var(--neon-blue)";
            desc.innerText = `Protocolo concluído com sucesso. Dados totais: ${score} TB.`;
        }
    }

    addNewCommand(); addNewCommand(); addNewCommand();
</script>
</body>
</html>
