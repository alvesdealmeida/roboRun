<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROBO EVOLUTION: MULTIVERSE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f3ff; --mag: #ff00ff; --green: #39ff14; --gold: #ffcc00;
        }
        * { box-sizing: border-box; font-family: 'Share Tech Mono', monospace; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: #000; color: #fff; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden; touch-action: none; 
        }

        /* TRAVA DESKTOP */
        #desktop-blocker {
            display: none; position: fixed; inset: 0; background: #050510; 
            z-index: 10000; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; color: var(--mag);
        }
        @media (min-width: 1025px) { #desktop-blocker { display: flex; } }

        /* CENÁRIO COM TRANSIÇÃO SUAVE */
        #game-screen {
            flex: 1; position: relative; overflow: hidden;
            border-bottom: 5px solid rgba(255,255,255,0.2);
            transition: all 1s ease-in-out;
        }

        /* Temas de Fundo */
        .theme-1 { background: linear-gradient(180deg, #001220 0%, #004e92 100%); }
        .theme-2 { background: linear-gradient(180deg, #2d0b36 0%, #c31432 100%); }
        .theme-3 { background: linear-gradient(180deg, #000000 0%, #0f9b0f 100%); }

        #robot {
            position: absolute; bottom: 20px; left: 10%; font-size: 60px; z-index: 100;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.8));
            transition: bottom 0.25s cubic-bezier(0.15, 0.85, 0.35, 1), transform 0.2s;
        }

        .entity { 
            position: absolute; font-size: 42px; z-index: 50; 
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
            transition: transform 0.1s;
        }

        /* HUD */
        .hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 200; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }

        /* CONTROLES */
        #controls { 
            height: 22vh; min-height: 180px; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 30px; background: rgba(0,0,0,0.9);
        }

        .joy-btn {
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #btn-run { border-color: var(--cyan); color: var(--cyan); }
        #btn-run.active { background: var(--cyan); color: #000; transform: scale(0.9); }
        #btn-jump { border-color: var(--mag); color: var(--mag); }
        #btn-jump.active { background: var(--mag); color: #000; transform: scale(0.9); }

        /* MODAIS */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 3000; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center;
        }
        .btn-restart {
            margin-top: 20px; padding: 20px 50px; background: var(--green); 
            border: none; font-weight: bold; border-radius: 50px; font-size: 1.2rem;
        }

        /* CRÉDITO DO DESENVOLVEDOR */
        .dev-footer {
            position: absolute;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body class="theme-1">

    <div id="desktop-blocker">
        <h1>SISTEMA RESTRITO</h1>
        <p>Acesse pelo celular ou tablet.</p>
    </div>

    <div id="modal-start" class="modal" style="display: flex;">
        <h1 style="color: var(--cyan);">ROBO EVOLUTION</h1>
        <p>O MUNDO MUDA CONFORME VOCÊ AVANÇA</p>
        <button class="btn-restart" onclick="startGame()">CONECTAR</button>
    </div>

    <div id="modal-over" class="modal">
        <h1 style="color: var(--mag);">CONEXÃO PERDIDA</h1>
        <p id="final-score" style="font-size: 1.5rem;"></p>
        <button class="btn-restart" onclick="location.reload()">REBOOT</button>
    </div>

    <div id="game-screen">
        <div class="hud">
            <div class="stat">HP <span id="hp">❤❤❤</span></div>
            <div class="stat">SCORE <span id="score">0</span></div>
            <div class="stat">LVL <span id="lvl">1</span></div>
        </div>
        <div id="robot">🤖</div>
    </div>

    <div id="controls">
        <div id="btn-run" class="joy-btn"><span>⚡</span><span>TURBO</span></div>

         <div class="dev-footer">Dev: Sebastião Alves de Almeida | Build 1.0.4</div>
        
        <div id="btn-jump" class="joy-btn"><span>🚀</span><span>JUMP</span></div>
    </div>

<script>
    const G = {
        hp: 3, score: 0, lvl: 1, 
        running: false, jumping: false, active: false,
        speed: 6, lastSpawn: 0, entities: [],
        levels: [
            { robot: "🤖", good: "💰", bad: "⚠️", theme: "theme-1" },
            { robot: "🦾", good: "💎", bad: "💣", theme: "theme-2" },
            { robot: "🛸", good: "🔋", bad: "👾", theme: "theme-3" }
        ]
    };

    const screen = document.getElementById('game-screen');
    const robotEl = document.getElementById('robot');
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function beep(f, d, t='sine') {
        const o = audio.createOscillator(); const g = audio.createGain();
        o.frequency.value = f; o.type = t;
        g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + d);
        o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
    }

    const btnRun = document.getElementById('btn-run');
    const btnJump = document.getElementById('btn-jump');

    btnRun.addEventListener('touchstart', (e) => { e.preventDefault(); G.running = true; btnRun.classList.add('active'); });
    btnRun.addEventListener('touchend', () => { G.running = false; btnRun.classList.remove('active'); });

    btnJump.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        if(!G.jumping) {
            G.jumping = true;
            btnJump.classList.add('active');
            robotEl.style.bottom = '320px'; // Pulo alto
            beep(400, 0.2);
        } else {
            robotEl.style.bottom = '20px'; // Queda rápida
            beep(150, 0.1, 'sawtooth');
        }
    });

    robotEl.addEventListener('transitionend', () => {
        if(robotEl.style.bottom === '320px') {
            setTimeout(() => { if(G.jumping) robotEl.style.bottom = '20px'; }, 400);
        } else {
            G.jumping = false;
            btnJump.classList.remove('active');
        }
    });

    function startGame() {
        document.getElementById('modal-start').style.display = 'none';
        G.active = true;
        gameLoop();
    }

    function spawn() {
        const now = Date.now();
        const interval = 1000 / (1 + G.lvl * 0.2);
        if(now - G.lastSpawn > interval) {
            const h = [30, 130, 230, 320][Math.floor(Math.random() * 4)];
            const currentCfg = G.levels[Math.min(G.lvl - 1, 2)];
            const isBad = Math.random() > 0.6;
            
            const el = document.createElement('div');
            el.className = 'entity';
            el.innerText = isBad ? currentCfg.bad : currentCfg.good;
            el.style.bottom = h + 'px';
            el.style.left = window.innerWidth + 'px';
            screen.appendChild(el);
            G.entities.push({ el, x: window.innerWidth, type: isBad ? 'bad' : 'good' });
            G.lastSpawn = now;
        }
    }

    function gameLoop() {
        if(!G.active) return;
        
        let curSpeed = G.running ? G.speed * 2.5 : G.speed;
        spawn();

        for(let i = G.entities.length - 1; i >= 0; i--) {
            let item = G.entities[i];
            item.x -= curSpeed;
            item.el.style.left = item.x + 'px';

            const rRect = robotEl.getBoundingClientRect();
            const iRect = item.el.getBoundingClientRect();

            // Colisão
            if(!(iRect.right < rRect.left + 15 || iRect.left > rRect.right - 15 || 
                 iRect.bottom < rRect.top + 15 || iRect.top > rRect.bottom - 15)) {
                
                if(item.type === 'bad') {
                    G.hp--; beep(80, 0.4, 'sawtooth');
                } else {
                    G.score += G.running ? 30 : 10; beep(800, 0.05);
                    // Lógica de subir nível
                    if(G.score >= G.lvl * 400 && G.lvl < 3) {
                        G.lvl++;
                        G.speed += 1.5;
                        const cfg = G.levels[G.lvl - 1];
                        document.body.className = cfg.theme;
                        robotEl.innerText = cfg.robot;
                        beep(1000, 0.5);
                    }
                }
                item.el.remove();
                G.entities.splice(i, 1);
                updateHUD();
            } else if(item.x < -100) {
                item.el.remove();
                G.entities.splice(i, 1);
            }
        }

        if(G.hp <= 0) {
            G.active = false;
            document.getElementById('final-score').innerText = "SCORE: " + G.score;
            document.getElementById('modal-over').style.display = 'flex';
        } else {
            requestAnimationFrame(gameLoop);
        }
    }

    function updateHUD() {
        document.getElementById('hp').innerText = '❤'.repeat(Math.max(0, G.hp));
        document.getElementById('score').innerText = G.score;
        document.getElementById('lvl').innerText = G.lvl;
    }
</script>
</body>
</html>
